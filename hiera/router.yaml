eizo::interfaces:
  eno1:
    order: 1
  lan-isolated:
    description: "Isolated LAN network"
    vlan:
      over: eno1
      id: 1
    static:
      inet: 192.168.119.1/26
    order: 2
  internet:
    description: "Freebox"
    vlan:
      over: eno1
      id: 832
    order: 4
    static:
      inet: 82.65.183.113/24
      inet6: fe80::100/64
    gateway:
      inet: 82.65.183.254
      inet6: fe80::3a07:16ff:fe1d:9460
  lan-trusted:
    description: "Trusted LAN network"
    static:
      inet: 192.168.117.1/26
      inet6: 2a01:e0a:f61:4db0::/64
    vlan:
      over: eno1
      id: 6
    order: 2
  lan-guest:
    description: "Guest LAN network"
    static:
      inet: 192.168.118.1/26
      inet6: 2a01:e0a:f61:4db1::/64
    vlan:
      over: eno1
      id: 8
    order: 2
  lan-games:
    description: "Games LAN network"
    static:
      inet: 192.168.118.129/26
      inet6: 2a01:e0a:f61:4db2::/64
    vlan:
      over: eno1
      id: 9
    order: 2
  lan-tv:
    description: "TV LAN network"
    static:
      inet: 192.168.118.193/26
      inet6: 2a01:e0a:f61:4db3::/64
    vlan:
      over: eno1
      id: 10
    order: 2

# That's unfortunate, but lookup will done in Puppet
eizo::dnsmasq::dhcp: "eizo::interfaces"
eizo::dnsmasq::dhcp_hosts:
  gs110tp:    "e4:f4:c6:f1:4c:7a"
  gs108t:     "20:4e:7f:77:87:3f"
  hl-4150cdn: "00:1b:a9:9b:ea:82"
